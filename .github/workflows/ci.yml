name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - run: pip install flake8 anybadge cppcheck

      - name: Run flake8
        id: flake8
        run: flake8 src/
        continue-on-error: true

      - name: Lint C extensions
        id: lint_c
        run: make lint
        continue-on-error: true

      - name: Generate badge
        run: |
          mkdir -p site/badges
          if [ "${{ steps.flake8.outcome }}" = "success" ]; then
            python -c "import anybadge; b = anybadge.Badge('flake8', 'passing', default_color='green'); b.write_badge('site/badges/flake8.svg', overwrite=True)"
          else
            python -c "import anybadge; b = anybadge.Badge('flake8', 'failing', default_color='bright_red'); b.write_badge('site/badges/flake8.svg', overwrite=True)"
          fi

      - name: Publish badge
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
          keep_files: true

      - name: Fail if flake8 failed
        if: steps.flake8.outcome == 'failure'
        run: exit 1

      - name: Fail if lint-c failed
        if: steps.lint_c.outcome == 'failure'
        run: exit 1

  unit:
    name: Unit tests
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e . && pip install pytest pytest-cov
      - run: pytest -m unit -v --cov=src/hodoku --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unit

  reglib:
    name: Reglib regression suite
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - run: pip install -e . && pip install pytest pytest-cov
      - run: pytest tests/reglib/ --ignore=tests/reglib/test_reglib_ex.py -v --cov=src/hodoku --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: hodoku-py
          files: coverage.xml
          flags: reglib
