name: Nightly Coverage

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage (exemplars-1.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e . && pip install pytest pytest-cov py4j

      - name: Run coverage
        run: >
          pytest tests/parity/ --puzzle-file exemplars-1.0 -v --tb=short
          --puzzle-timeout 300
          --cov=src/hodoku --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          name: hodoku-py
          flags: nightly
