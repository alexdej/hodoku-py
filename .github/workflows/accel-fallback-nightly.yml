name: Nightly Accel Fallback

on:
  schedule:
    - cron: "0 7 * * *"  # daily at 07:00 UTC (after coverage-nightly)
  workflow_dispatch:

jobs:
  fallback:
    name: Pure-Python fallback (no C extensions)
    runs-on: ubuntu-latest
    env:
      HODOKU_NO_ACCEL: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install package with test dependencies
        run: pip install -e .[test]

      - name: Lint
        run: make lint

      - name: Unit tests (generator fallback)
        run: pytest -m unit -v --cov=src/hodoku --cov-report=xml --cov-append

      - name: Generator API tests (generate/validate fallback)
        run: pytest tests/generator/test_generator_api.py -v --cov=src/hodoku --cov-report=xml --cov-append

      - name: Reglib suite (fish fallback)
        run: pytest tests/reglib/ --ignore=tests/reglib/test_reglib_ex.py -v --cov=src/hodoku --cov-report=xml --cov-append

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          name: hodoku-py
          flags: fallback
