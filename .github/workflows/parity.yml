name: Parity

on:
  workflow_dispatch:

jobs:
  parity:
    name: ${{ matrix.puzzle-file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        puzzle-file:
          - exemplars-1.0
          - qqwing_simple
          - qqwing_easy
          - qqwing_intermediate
          - qqwing_expert
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e . && pip install pytest py4j

      - name: Run parity tests
        run: pytest tests/parity/ --puzzle-file ${{ matrix.puzzle-file }} -v --tb=short --junitxml=parity-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-${{ matrix.puzzle-file }}
          path: parity-results.xml
