name: Parity

on:
  workflow_dispatch:

jobs:
  parity:
    name: ${{ matrix.puzzle-file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        puzzle-file:
          - exemplars-1.0
          - qqwing_simple
          - qqwing_easy
          - qqwing_intermediate
          - qqwing_expert
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e . && pip install pytest py4j

      - name: Run parity tests
        run: pytest tests/parity/ --puzzle-file ${{ matrix.puzzle-file }} -v --tb=short --junitxml=parity-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: parity-${{ matrix.puzzle-file }}
          path: parity-results.xml
