name: Parity

on:
  workflow_dispatch:
    inputs:
      puzzle-file:
        description: "Puzzle file stem (e.g. exemplars-1.0)"
        required: true
        default: "exemplars-1.0"
      puzzle-count:
        description: "Max puzzles to run (0 = all)"
        required: false
        default: "0"
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC

jobs:
  parity:
    name: Parity – ${{ github.event.inputs.puzzle-file || 'exemplars-1.0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e . && pip install pytest py4j

      - name: Run parity tests
        run: |
          PUZZLE_FILE="${{ github.event.inputs.puzzle-file || 'exemplars-1.0' }}"
          COUNT="${{ github.event.inputs.puzzle-count || '0' }}"
          ARGS="tests/parity/ --puzzle-file $PUZZLE_FILE -v --tb=short"
          if [ "$COUNT" != "0" ]; then
            ARGS="$ARGS --puzzle-count $COUNT"
          fi
          pytest $ARGS --junitxml=parity-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-results
          path: parity-results.xml
