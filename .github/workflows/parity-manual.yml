name: Parity (ad-hoc)

on:
  workflow_dispatch:
    inputs:
      puzzle-file:
        description: "Puzzle file stem (e.g. exemplars-1.0, sudoku17)"
        required: true
      puzzle-count:
        description: "Max puzzles (0 = all)"
        required: false
        default: "0"
      puzzle-seed:
        description: "Random seed for sampling (only used with puzzle-count)"
        required: false
        default: "0"
      puzzle-timeout:
        description: "Per-puzzle solver timeout in seconds"
        required: false
        default: "30"

jobs:
  parity:
    name: ${{ github.event.inputs.puzzle-file }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e .[test,test-parity]

      - name: Run parity tests
        run: |
          ARGS="tests/parity/ --puzzle-file ${{ github.event.inputs.puzzle-file }} -v --tb=short"
          if [ "${{ github.event.inputs.puzzle-count }}" != "0" ]; then
            ARGS="$ARGS --puzzle-count ${{ github.event.inputs.puzzle-count }}"
          fi
          if [ "${{ github.event.inputs.puzzle-seed }}" != "0" ]; then
            ARGS="$ARGS --puzzle-seed ${{ github.event.inputs.puzzle-seed }}"
          fi
          pytest $ARGS --puzzle-timeout ${{ github.event.inputs.puzzle-timeout }} --junitxml=parity-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: parity-${{ github.event.inputs.puzzle-file }}
          path: parity-results.xml

  report:
    name: Generate report
    runs-on: ubuntu-latest
    needs: parity
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - run: pip install anybadge

      - name: Download parity results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: parity-${{ github.event.inputs.puzzle-file }}
          path: parity-results/parity-${{ github.event.inputs.puzzle-file }}/

      - name: Generate report
        run: python scripts/generate_parity_report.py --results-dir parity-results/ --output-dir site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
          destination_dir: parity
          keep_files: true
