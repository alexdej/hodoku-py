name: Nightly Parity

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  parity:
    name: ${{ matrix.puzzle-file }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        puzzle-file:
          - exemplars-1.0
          - top1465
          - qqwing_simple
          - qqwing_easy
          - qqwing_intermediate
          - qqwing_expert
          - HardestDatabase110626
        include:
          - puzzle-file: HardestDatabase110626
            puzzle-timeout: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e .[test,test-parity]

      - name: Run parity tests
        run: >
          pytest tests/parity/ --puzzle-file ${{ matrix.puzzle-file }} --puzzle-timeout ${{ matrix.puzzle-timeout || 30 }} -v --tb=short --junitxml=parity-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: parity-${{ matrix.puzzle-file }}
          path: parity-results.xml

  report:
    name: Generate report
    runs-on: ubuntu-latest
    needs: parity
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - run: pip install anybadge

      - name: Download all parity results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: parity-*
          path: parity-results/

      - name: Generate report
        run: python scripts/generate_parity_report.py --results-dir parity-results/ --output-dir site/parity/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
          keep_files: true
