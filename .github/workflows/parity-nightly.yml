name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  parity:
    name: ${{ matrix.puzzle-file }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        puzzle-file:
          - exemplars-1.0
          - top1465
          - qqwing_simple
          - qqwing_easy
          - qqwing_intermediate
          - qqwing_expert
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e . && pip install pytest pytest-cov py4j

      - name: Run parity tests
        run: >
          pytest tests/parity/ --puzzle-file ${{ matrix.puzzle-file }} -v --tb=short --junitxml=parity-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-${{ matrix.puzzle-file }}
          path: parity-results.xml

  coverage:
    name: Coverage (exemplars-1.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e . && pip install pytest pytest-cov py4j

      - name: Run coverage
        run: >
          pytest tests/parity/ --puzzle-file exemplars-1.0 -v --tb=short
          --puzzle-timeout 120
          --cov=src/hodoku --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          name: hodoku-py
          flags: nightly

  report:
    name: Generate report
    runs-on: ubuntu-latest
    needs: parity
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install anybadge

      - name: Download all parity results
        uses: actions/download-artifact@v8
        with:
          pattern: parity-*
          path: parity-results/

      - name: Generate report
        run: python scripts/generate_parity_report.py --results-dir parity-results/ --output-dir site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
          keep_files: true
