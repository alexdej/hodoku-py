name: Parity (nightly)

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC

jobs:
  parity:
    name: ${{ matrix.puzzle-file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        puzzle-file:
          - exemplars-1.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -e . && pip install pytest py4j

      - name: Run parity tests
        run: pytest tests/parity/ --puzzle-file ${{ matrix.puzzle-file }} -v --tb=short --junitxml=parity-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-${{ matrix.puzzle-file }}
          path: parity-results.xml
