services:
  claude:
    image: hodoku-claude:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.claude
      args:
        APP_USER: ${USER}
    stdin_open: true
    tty: true
    volumes:
      - ..:/workspace/hodoku-py
      - ../../HoDoKu:/workspace/HoDoKu:ro
      - ~/.claude:/home/${USER}/.claude:ro
      - ~/.claude.json:/home/${USER}/.claude.json
