services:
  claude:
    image: hodoku-claude:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.claude
      args:
        APP_USER: me
    stdin_open: true
    tty: true
    volumes:
      - ..:/workspace/hodoku-py
      - ../../HoDoKu:/workspace/HoDoKu:ro
      - ~/.config/jj:/root/.config/jj:ro
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
